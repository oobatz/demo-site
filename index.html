    function getRouteFromHash() {
      if (window.location.hash === "#admin") return "admin";
      if (window.location.hash === "#projects") return "projects";
      return "public";
    }

    function readStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        console.error("Ошибка чтения localStorage:", error);
        return fallback;
      }
    }

    /*
      Как хранится контент:
      1. Проекты, настройки и контакты хранятся в localStorage.
      2. Любое редактирование в админке моментально влияет на публичные страницы.
      3. Для переноса на другой компьютер экспортируйте JSON и импортируйте его там.
    */
    function writeStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getProjects() {
      const stored = readStorage(STORAGE_KEYS.projects, null);
      if (stored) return stored;
      writeStorage(STORAGE_KEYS.projects, defaultProjects);
      return defaultProjects;
    }

    function getSettings() {
      const stored = readStorage(STORAGE_KEYS.settings, null);
      if (stored) return stored;
      writeStorage(STORAGE_KEYS.settings, defaultSettings);
      return defaultSettings;
    }

    function getContacts() {
      const stored = readStorage(STORAGE_KEYS.contacts, null);
      if (stored) return stored;
      writeStorage(STORAGE_KEYS.contacts, defaultContacts);
      return defaultContacts;
    }

    function isAuthenticated() {
      return sessionStorage.getItem(SESSION_KEYS.auth) === "true";
    }

    function setAuthenticated(value) {
      if (value) sessionStorage.setItem(SESSION_KEYS.auth, "true");
      else sessionStorage.removeItem(SESSION_KEYS.auth);
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function showToast(message, type = "success") {
      const id = crypto.randomUUID();
      state.toasts = [...state.toasts, { id, message, type }];
      render();
      setTimeout(() => {
        state.toasts = state.toasts.filter((toast) => toast.id !== id);
        render();
      }, 3000);
    }

    function formatMoney(value) {
      return `$${Number(value || 0).toLocaleString("ru-RU")}`;
    }

    function formatDate(dateString) {
      return new Intl.DateTimeFormat("ru-RU", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(new Date(dateString));
    }

    function getPublicProjects() {
      return getProjects().filter((item) => item.published && item.status !== "Черновик");
    }

    function getFilteredProjects() {
      let list = [...getPublicProjects()];

      if (state.typeFilter !== "Все") {
        list = list.filter((item) => item.siteType === state.typeFilter);
      }

      if (state.statusFilter !== "Все") {
        list = list.filter((item) => item.status === state.statusFilter);
      }

      list.sort((a, b) => {
        if (state.sort === "priceAsc") return Number(a.price) - Number(b.price);
        if (state.sort === "priceDesc") return Number(b.price) - Number(a.price);
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      return list;
    }

    function getStats() {
      const projects = getProjects();
      return {
        total: projects.length,
        published: projects.filter((item) => item.published && item.status !== "Черновик").length,
        forSale: projects.filter((item) => item.published && item.status === "В продаже").length,
        portfolio: projects.filter((item) => item.published && item.status === "Портфолио").length,
        sold: projects.filter((item) => item.status === "Продан").length,
        value: projects.filter((item) => item.published && item.status === "В продаже").reduce((sum, item) => sum + Number(item.price || 0), 0)
      };
    }

    function getProjectById(id) {
      return getProjects().find((item) => item.id === id) || null;
    }

    function getInitialDraft(item) {
      return {
        title: item?.title || "",
        fullTitle: item?.fullTitle || "",
        siteType: item?.siteType || "Лендинг",
        niche: item?.niche || "",
        status: item?.status || "В продаже",
        price: item?.price ?? "",
        oldPrice: item?.oldPrice ?? "",
        description: item?.description || "",
        details: item?.details || "",
        features: Array.isArray(item?.features) ? item.features.join(", ") : "",
        tech: Array.isArray(item?.tech) ? item.tech.join(", ") : "",
        demoUrl: item?.demoUrl || "",
        buyUrl: item?.buyUrl || "",
        previewUrl: item?.previewUrl || "",
        delivery: item?.delivery || "",
        support: item?.support || "",
        featured: Boolean(item?.featured),
        published: Boolean(item?.published)
      };
    }

    function getStatusClass(status) {
      if (status === "В продаже") return "bg-emerald-50 text-emerald-700";
      if (status === "Портфолио") return "bg-blue-50 text-blue-700";
      if (status === "Продан") return "bg-slate-200 text-slate-700";
      return "bg-slate-100 text-slate-500";
    }

    function navigate(route) {
      state.route = route;

      window.scrollTo({ top: 0, behavior: "smooth" });

      const previewStyle = item.previewUrl

                    <label class="grid gap-2 text-sm font-medium">

                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Заголовок каталога
                      <input name="catalogTitle" value="${escapeHtml(settings.catalogTitle)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Описание каталога
                      <textarea name="catalogSubtitle" rows="3" required class="rounded-3xl border border-line px-4 py-3 outline-none transition focus:border-accent">${escapeHtml(settings.catalogSubtitle)}</textarea>

                    <label class="grid gap-2 text-sm font-medium">

                      <input name="aboutTitle" value="${escapeHtml(settings.aboutTitle)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">

                      <textarea name="aboutText" rows="4" required class="rounded-3xl border border-line px-4 py-3 outline-none transition focus:border-accent">${escapeHtml(settings.aboutText)}</textarea>

                    <label class="grid gap-2 text-sm font-medium">
                      Текст кнопки CTA
                      <input name="ctaLabel" value="${escapeHtml(settings.ctaLabel)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Ссылка CTA
                      <input name="ctaLink" value="${escapeHtml(settings.ctaLink)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Email
                      <input name="email" value="${escapeHtml(contacts.email)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Telegram
                      <input name="telegram" value="${escapeHtml(contacts.telegram)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      WhatsApp
                      <input name="whatsapp" value="${escapeHtml(contacts.whatsapp)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      GitHub URL
                      <input name="githubRepo" value="${escapeHtml(contacts.githubRepo)}" required class="rounded-2xl border border-line px-4 py-3 outline-none transition focus:border-accent">
                    </label>
                    <label class="grid gap-2 text-sm font-medium">
                      Служебная заметка
                      <textarea name="note" rows="3" required class="rounded-3xl border border-line px-4 py-3 outline-none transition focus:border-accent">${escapeHtml(settings.note)}</textarea>
                    </label>
                    <button type="submit" class="rounded-full border border-line px-6 py-4 text-sm font-semibold transition hover:border-slate-400">Сохранить настройки</button>

            </section>
          </main>
        </div>
      `;
    }

    function renderModalLayer() {
      const item = getProjectById(state.modalProjectId);
      const deleteItem = getProjectById(state.deleteTargetId);
      const blocks = [];

      if (item) {
        const previewStyle = item.previewUrl
          ? `style="background-image:linear-gradient(135deg, rgba(15,23,42,.76), rgba(15,98,254,.18)),url('${escapeHtml(item.previewUrl)}')"`
          : "";

        blocks.push(`
          <div class="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/55 p-4">
            <div class="max-h-[92vh] w-full max-w-3xl overflow-auto rounded-[32px] bg-white p-8 shadow-panel">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <div class="flex flex-wrap gap-2">
                    <span class="rounded-full px-3 py-1 text-xs font-semibold ${getStatusClass(item.status)}">${escapeHtml(item.status)}</span>
                    <span class="rounded-full border border-line px-3 py-1 text-xs font-semibold text-slate-500">${escapeHtml(item.siteType)}</span>
                  </div>
                  <h3 class="mt-4 font-display text-3xl font-extrabold tracking-tight">${escapeHtml(item.fullTitle)}</h3>
                  <p class="mt-2 text-sm text-soft">${escapeHtml(item.niche)}</p>
                </div>
                <button type="button" data-action="close-modal" class="rounded-full border border-line px-4 py-2 text-sm font-semibold">Закрыть</button>
              </div>
              <div class="preview mt-6 h-72 rounded-[28px] border border-line" data-type="${escapeHtml(item.siteType)}" ${previewStyle}></div>
              <div class="mt-6 grid gap-8 lg:grid-cols-[1fr_0.8fr]">
                <div>
                  <p class="text-base leading-8 text-soft">${escapeHtml(item.details)}</p>
                  <div class="mt-6">
                    <p class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Что входит</p>
                    <div class="mt-3 flex flex-wrap gap-2">
                      ${item.features.map((feature) => `<span class="rounded-full border border-line bg-mist px-4 py-2 text-sm font-medium">${escapeHtml(feature)}</span>`).join("")}
                    </div>
                  </div>
                </div>
                <div class="rounded-[28px] border border-line bg-mist p-6">
                  <p class="text-sm text-soft">Стоимость</p>
                  <div class="mt-3 flex items-center gap-3">
                    <span class="font-display text-4xl font-extrabold">${formatMoney(item.price)}</span>
                    ${item.oldPrice ? `<span class="text-sm text-slate-400 line-through">${formatMoney(item.oldPrice)}</span>` : ""}
                  </div>
                  <p class="mt-6 text-sm text-soft">Стек: ${escapeHtml(item.tech.join(", "))}</p>
                  <p class="mt-3 text-sm text-soft">${escapeHtml(item.delivery)}</p>
                  <p class="mt-3 text-sm text-soft">${escapeHtml(item.support)}</p>
                  <div class="mt-8 flex flex-wrap gap-3">
                    <a href="${escapeHtml(item.demoUrl || "#")}" target="_blank" rel="noreferrer" class="rounded-full border border-line px-5 py-3 text-sm font-semibold transition hover:border-slate-400">Открыть демо</a>
                    <a href="${escapeHtml(item.buyUrl || "#contact")}" class="rounded-full bg-ink px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Обсудить проект</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `);
      }

      if (deleteItem) {
        blocks.push(`
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/55 p-4">
            <div class="w-full max-w-md rounded-[32px] bg-white p-8 shadow-panel">
              <p class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Подтверждение</p>
              <h3 class="mt-3 font-display text-3xl font-extrabold tracking-tight">Удалить карточку?</h3>
              <p class="mt-4 text-sm leading-7 text-soft">Карточка <span class="font-semibold text-ink">${escapeHtml(deleteItem.fullTitle)}</span> будет удалена из localStorage.</p>
              <div class="mt-8 flex flex-wrap gap-3">
                <button type="button" data-action="delete-project" data-id="${deleteItem.id}" class="rounded-full bg-red-600 px-5 py-3 text-sm font-semibold text-white">Удалить</button>
                <button type="button" data-action="cancel-delete" class="rounded-full border border-line px-5 py-3 text-sm font-semibold">Отмена</button>
              </div>
            </div>
          </div>
        `);
      }

      return blocks.join("");
    }

    function renderToasts() {
      return `
        <div class="pointer-events-none fixed bottom-4 right-4 z-[60] flex w-full max-w-sm flex-col gap-3">
          ${state.toasts.map((toast) => `
            <div class="pointer-events-auto rounded-2xl border ${toast.type === "error" ? "border-red-200 bg-red-50 text-red-700" : "border-emerald-200 bg-emerald-50 text-emerald-700"} px-4 py-3 text-sm font-medium shadow-card">
              ${escapeHtml(toast.message)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = `
        ${state.route === "public" ? renderPublicPage() : state.route === "projects" ? renderProjectsPage() : (isAuthenticated() ? renderAdminDashboard() : renderAdminLogin())}
        ${renderModalLayer()}
        ${renderToasts()}
      `;

      document.body.classList.toggle("modal-open", Boolean(state.modalProjectId || state.deleteTargetId));
      bindEvents();
      observeReveal();
    }

    function bindEvents() {
      document.querySelectorAll("[data-route]").forEach((button) => {
        button.addEventListener("click", () => navigate(button.dataset.route));
      });

      const typeFilter = document.getElementById("type-filter");
      if (typeFilter) {
        typeFilter.addEventListener("change", (event) => {
          state.typeFilter = event.target.value;
          render();
        });
      }

      const statusFilter = document.getElementById("status-filter");
      if (statusFilter) {
        statusFilter.addEventListener("change", (event) => {
          state.statusFilter = event.target.value;
          render();
        });
      }

      const sortFilter = document.getElementById("sort-filter");
      if (sortFilter) {
        sortFilter.addEventListener("change", (event) => {
          state.sort = event.target.value;
          render();
        });
      }

      document.querySelectorAll("[data-action='open-modal']").forEach((button) => {
        button.addEventListener("click", () => {
          state.modalProjectId = button.dataset.id;
          render();
        });
      });

      document.querySelectorAll("[data-action='close-modal']").forEach((button) => {
        button.addEventListener("click", () => {
          state.modalProjectId = null;
          render();
        });
      });

      document.querySelectorAll("[data-action='new-project']").forEach((button) => {
        button.addEventListener("click", () => {
          state.editingId = null;
          state.draft = getInitialDraft();
          render();
        });
      });

      document.querySelectorAll("[data-action='edit-project']").forEach((button) => {
        button.addEventListener("click", () => {
          const item = getProjectById(button.dataset.id);
          state.editingId = button.dataset.id;
          state.draft = getInitialDraft(item);
          render();
        });
      });

      document.querySelectorAll("[data-action='duplicate-project']").forEach((button) => {
        button.addEventListener("click", () => duplicateProject(button.dataset.id));
      });

      document.querySelectorAll("[data-action='confirm-delete']").forEach((button) => {
        button.addEventListener("click", () => {
          state.deleteTargetId = button.dataset.id;
          render();
        });
      });

      document.querySelectorAll("[data-action='cancel-delete']").forEach((button) => {
        button.addEventListener("click", () => {
          state.deleteTargetId = null;
          render();
        });
      });

      document.querySelectorAll("[data-action='delete-project']").forEach((button) => {
        button.addEventListener("click", () => deleteProject(button.dataset.id));
      });

      document.querySelectorAll("[data-action='cancel-edit']").forEach((button) => {
        button.addEventListener("click", () => {
          state.editingId = null;
          state.draft = null;
          render();
        });
      });

      document.querySelectorAll("[data-action='logout']").forEach((button) => {
        button.addEventListener("click", () => {
          setAuthenticated(false);
          state.editingId = null;
          state.draft = null;
          showToast("Сессия завершена.");
          render();
        });
      });

      document.querySelectorAll("[data-action='export-json']").forEach((button) => {
        button.addEventListener("click", exportData);
      });

      const importInput = document.getElementById("import-input");
      if (importInput) importInput.addEventListener("change", importData);

      const loginForm = document.getElementById("login-form");
      if (loginForm) loginForm.addEventListener("submit", handleLogin);

      const contactForm = document.getElementById("contact-form");
      if (contactForm) {
        contactForm.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(contactForm);
          if (!data.get("name") || !data.get("email") || !data.get("message")) {
            showToast("Заполните обязательные поля формы.", "error");
            return;
          }
          contactForm.reset();
          showToast("Запрос сохранен в демо-режиме.");
        });
      }

      const projectForm = document.getElementById("project-form");
      if (projectForm) {
        projectForm.addEventListener("input", () => {
          state.draft = collectProjectForm(projectForm);
        });
        projectForm.addEventListener("submit", handleProjectSubmit);
      }

      const settingsForm = document.getElementById("settings-form");
      if (settingsForm) settingsForm.addEventListener("submit", handleSettingsSubmit);
    }

    function collectProjectForm(form) {
      const data = new FormData(form);
      return {
        title: String(data.get("title") || "").trim(),
        fullTitle: String(data.get("fullTitle") || "").trim(),
        siteType: String(data.get("siteType") || "Лендинг").trim(),
        niche: String(data.get("niche") || "").trim(),
        status: String(data.get("status") || "В продаже").trim(),
        price: Number(data.get("price") || 0),
        oldPrice: data.get("oldPrice") ? Number(data.get("oldPrice")) : 0,
        description: String(data.get("description") || "").trim(),
        details: String(data.get("details") || "").trim(),
        features: String(data.get("features") || "").split(",").map((item) => item.trim()).filter(Boolean),
        tech: String(data.get("tech") || "").split(",").map((item) => item.trim()).filter(Boolean),
        demoUrl: String(data.get("demoUrl") || "").trim(),
        buyUrl: String(data.get("buyUrl") || "").trim(),
        previewUrl: String(data.get("previewUrl") || "").trim(),
        delivery: String(data.get("delivery") || "").trim(),
        support: String(data.get("support") || "").trim(),
        featured: data.get("featured") === "on",
        published: data.get("published") === "on"
      };
    }

    function handleLogin(event) {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      const username = String(data.get("username") || "").trim();
      const password = String(data.get("password") || "").trim();

      if (username === DEMO_AUTH.username && password === DEMO_AUTH.password) {
        setAuthenticated(true);
        showToast("Вход выполнен.");
        render();
      } else {
        showToast("Неверный логин или пароль.", "error");
      }
    }

    /*
      Как добавлять новые проекты:
      1. Откройте #admin и войдите.
      2. Заполните карточку: тип сайта, нишу, цену, статус и ссылки.
      3. Статус "Портфолио" оставляет проект на странице проектов как кейс.
      4. Статус "В продаже" показывает проект как готовое решение для покупки.
    */
    function handleProjectSubmit(event) {
      event.preventDefault();
      const draft = collectProjectForm(event.currentTarget);

      if (
        !draft.title ||
        !draft.fullTitle ||
        !draft.siteType ||
        !draft.niche ||
        !draft.status ||
        !draft.price ||
        !draft.description ||
        !draft.details ||
        !draft.features.length ||
        !draft.tech.length ||
        !draft.demoUrl ||
        !draft.buyUrl ||
        !draft.delivery ||
        !draft.support
      ) {
        showToast("Заполните обязательные поля карточки.", "error");
        return;
      }

      const projects = getProjects();
      const existing = projects.find((item) => item.id === state.editingId);
      const prepared = {
        id: existing?.id || crypto.randomUUID(),
        createdAt: existing?.createdAt || new Date().toISOString().slice(0, 10),
        views: existing?.views || Math.floor(200 + Math.random() * 1000),
        leads: existing?.leads || Math.floor(3 + Math.random() * 25),
        ...draft
      };

      const nextProjects = existing
        ? projects.map((item) => item.id === existing.id ? prepared : item)
        : [prepared, ...projects];

      writeStorage(STORAGE_KEYS.projects, nextProjects);
      state.editingId = null;
      state.draft = null;
      showToast(existing ? "Карточка обновлена." : "Карточка добавлена.");
      render();
    }

    function handleSettingsSubmit(event) {
      event.preventDefault();
      const data = new FormData(event.currentTarget);

      const nextSettings = {
        brand: String(data.get("brand") || "").trim(),
        descriptor: String(data.get("descriptor") || "").trim(),
        heroBadge: getSettings().heroBadge,
        heroTitle: String(data.get("heroTitle") || "").trim(),
        heroSubtitle: String(data.get("heroSubtitle") || "").trim(),
        catalogTitle: String(data.get("catalogTitle") || "").trim(),
        catalogSubtitle: String(data.get("catalogSubtitle") || "").trim(),
        ctaLabel: String(data.get("ctaLabel") || "").trim(),
        ctaLink: String(data.get("ctaLink") || "").trim(),
        note: String(data.get("note") || "").trim(),
        aboutTitle: String(data.get("aboutTitle") || "").trim(),
        aboutText: String(data.get("aboutText") || "").trim()
      };

      const nextContacts = {
        email: String(data.get("email") || "").trim(),
        telegram: String(data.get("telegram") || "").trim(),
        whatsapp: String(data.get("whatsapp") || "").trim(),
        githubRepo: String(data.get("githubRepo") || "").trim()
      };

      if (Object.values(nextSettings).some((value) => !value) || Object.values(nextContacts).some((value) => !value)) {
        showToast("Заполните поля настроек и контактов.", "error");
        return;
      }

      writeStorage(STORAGE_KEYS.settings, nextSettings);
      writeStorage(STORAGE_KEYS.contacts, nextContacts);
      showToast("Настройки сохранены.");
      render();
    }

    function duplicateProject(id) {
      const item = getProjectById(id);
      if (!item) return;

      const copy = {
        ...item,
        id: crypto.randomUUID(),
        title: `${item.title} Copy`,
        fullTitle: `${item.fullTitle} Copy`,
        createdAt: new Date().toISOString().slice(0, 10)
      };

      writeStorage(STORAGE_KEYS.projects, [copy, ...getProjects()]);
      showToast("Карточка продублирована.");
      render();
    }

    function deleteProject(id) {
      const next = getProjects().filter((item) => item.id !== id);
      writeStorage(STORAGE_KEYS.projects, next);
      state.deleteTargetId = null;
      if (state.editingId === id) {
        state.editingId = null;
        state.draft = null;
      }
      showToast("Карточка удалена.");
      render();
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        projects: getProjects(),
        settings: getSettings(),
        contacts: getContacts()
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "cia-showcase-backup.json";
      link.click();
      URL.revokeObjectURL(url);
      showToast("Экспорт выполнен.");
    }

    function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          if (!Array.isArray(parsed.projects) || !parsed.settings || !parsed.contacts) {
            showToast("Структура JSON некорректна.", "error");
            return;
          }
          writeStorage(STORAGE_KEYS.projects, parsed.projects);
          writeStorage(STORAGE_KEYS.settings, parsed.settings);
          writeStorage(STORAGE_KEYS.contacts, parsed.contacts);
          showToast("Данные импортированы.");
          render();
        } catch (error) {
          console.error(error);
          showToast("Не удалось импортировать JSON.", "error");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function observeReveal() {
      const items = document.querySelectorAll(".fade-up");
      if (!items.length || !("IntersectionObserver" in window)) {
        items.forEach((item) => item.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      items.forEach((item) => observer.observe(item));
    }

    window.addEventListener("hashchange", handleHashChange);
    render();
  </script>
</body>
</html>
